name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](ROADMAP.md) and existing issues before filing — your idea may already be tracked.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Measurement agent
        - Aggregation service
        - Dashboard
        - Helm chart
        - Energy provider (new or existing)
        - Inference provider (new or existing)
        - Storage backend (new or existing)
        - Prometheus metrics
        - OTLP export
        - KEDA / OpenCost integration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who is asking for it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider?

  - type: dropdown
    id: willing-to-implement
    attributes:
      label: Are you willing to implement this?
      options:
        - "Yes — I plan to open a PR"
        - "Possibly — I could contribute with guidance"
        - "No — proposing for the community"
    validations:
      required: true

name: Bug report
description: Something is not measuring correctly, or a component is not behaving as documented.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug report, check the [troubleshooting guide](docs/guides/troubleshooting.md) and search existing issues.

  - type: input
    id: version
    attributes:
      label: Aitra Meter version
      description: Output of `helm list -n aitra-system` or the image tag from `kubectl get pods -n aitra-system -o jsonpath='{.items[0].spec.containers[0].image}'`
      placeholder: "e.g. 0.8.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Measurement agent
        - Aggregation service
        - Dashboard
        - Helm chart
        - Zeus energy provider
        - NVML energy provider
        - vLLM inference provider
        - Generic-prometheus inference provider
        - SQLite storage backend
        - Prometheus metrics
        - OTLP export
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU hardware
      description: GPU model and driver version
      placeholder: "e.g. NVIDIA H100 SXM5 80GB, driver 560.28.03"

  - type: dropdown
    id: energy-provider
    attributes:
      label: Energy provider
      options:
        - Zeus (default)
        - NVML
        - Other / unknown

  - type: input
    id: inference-server
    attributes:
      label: Inference server
      description: Inference server and version
      placeholder: "e.g. vLLM 0.4.2, TGI 2.1.0"

  - type: input
    id: kubernetes
    attributes:
      label: Kubernetes version
      placeholder: "e.g. 1.30.1"

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include metric values, dashboard screenshots, or log output where relevant.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output of `kubectl logs -n aitra-system -l app=aitra-meter-agent` and `kubectl logs -n aitra-system -l app=aitra-meter-aggregation`
      render: shell

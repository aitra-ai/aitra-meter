{{- if .Values.dashboard.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aitra-meter.fullname" . }}-dashboard
  namespace: {{ include "aitra-meter.namespace" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "aitra-meter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "aitra-meter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          env:
            - name: PROMETHEUS_URL
              value: "http://{{ include "aitra-meter.fullname" . }}-aggregation-service:{{ .Values.aggregationService.port }}"
            - name: AGGREGATION_URL
              value: "http://{{ include "aitra-meter.fullname" . }}-aggregation-service:{{ .Values.aggregationService.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aitra-meter.fullname" . }}-dashboard
  namespace: {{ include "aitra-meter.namespace" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    {{- include "aitra-meter.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: http
      protocol: TCP
{{- end }}

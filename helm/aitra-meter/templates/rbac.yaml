---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aitra-meter.serviceAccountName" . }}
  namespace: {{ include "aitra-meter.namespace" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
---
# The aggregation service needs read access to pods (namespace + annotations)
# and nodes (hardware tier label) cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aitra-meter.fullname" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aitra-meter.fullname" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aitra-meter.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aitra-meter.serviceAccountName" . }}
    namespace: {{ include "aitra-meter.namespace" . }}

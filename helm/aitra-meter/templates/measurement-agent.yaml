---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "aitra-meter.fullname" . }}-measurement-agent
  namespace: {{ include "aitra-meter.namespace" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
    app.kubernetes.io/component: measurement-agent
spec:
  selector:
    matchLabels:
      {{- include "aitra-meter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: measurement-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "aitra-meter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: measurement-agent
      annotations:
        # Force pod restart when ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/measurement-agent-config.yaml") . | sha256sum }}
    spec:
      # GPU nodes require host PID namespace for NVML/Zeus access.
      hostPID: true
      nodeSelector:
        {{- toYaml .Values.measurementAgent.nodeSelector | nindent 8 }}
      tolerations:
        # Tolerate the standard GPU taint so the DaemonSet lands on GPU nodes
        # even when they have been tainted for dedicated inference use.
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: measurement-agent
          image: "{{ .Values.measurementAgent.image.repository }}:{{ .Values.measurementAgent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.measurementAgent.image.pullPolicy }}
          args:
            - --energy-provider={{ .Values.measurementAgent.energyProvider.type }}
            {{- with .Values.measurementAgent.hostEnergyProvider }}
            - --host-energy-provider={{ .type }}
            {{- end }}
            - --inference-provider={{ .Values.measurementAgent.inferenceProvider.type }}
            {{- if .Values.measurementAgent.inferenceProvider.config.endpoint }}
            - --inference-endpoint={{ .Values.measurementAgent.inferenceProvider.config.endpoint }}
            {{- end }}
            - --aggregator={{ include "aitra-meter.fullname" . }}-aggregation-service:9091
            - --log-level=info
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.measurementAgent.inferenceProvider.config.endpoint }}
            - name: INFERENCE_ENDPOINT
              value: {{ .Values.measurementAgent.inferenceProvider.config.endpoint | quote }}
            {{- end }}
            {{- if .Values.measurementAgent.nvml.hostLibraryPath }}
            # Driver-matched NVML library injected via hostPath (kind/bare-metal
            # nodes where the container runtime does not auto-mount driver libs).
            # LD_PRELOAD loads it at process start so go-nvml's cgo symbols bind
            # correctly (a plain dlopen after startup leaves the GOT slot at 0).
            - name: LD_PRELOAD
              value: /opt/nvml/libnvidia-ml.so.1
            - name: LD_LIBRARY_PATH
              value: /opt/nvml
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            privileged: true
          resources:
            {{- toYaml .Values.measurementAgent.resources | nindent 12 }}
          {{- if .Values.measurementAgent.httpProbes }}
          # The agent is a gRPC-push loop with no HTTP server in this build; probes
          # are opt-in and only valid once an HTTP metrics/health server is wired in.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          {{- $rapl := eq .Values.measurementAgent.hostEnergyProvider.type "rapl" }}
          {{- if or .Values.measurementAgent.nvml.hostLibraryPath $rapl }}
          volumeMounts:
            {{- if .Values.measurementAgent.nvml.hostLibraryPath }}
            - name: nvml-lib
              mountPath: /opt/nvml/libnvidia-ml.so.1
              readOnly: true
            {{- end }}
            {{- if $rapl }}
            # RAPL reads /sys/class/powercap. Mounted explicitly so the counters
            # are visible in the pod rather than relying on the default /sys mount.
            - name: powercap
              mountPath: /sys/class/powercap
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.measurementAgent.nvml.hostLibraryPath $rapl }}
      volumes:
        {{- if .Values.measurementAgent.nvml.hostLibraryPath }}
        - name: nvml-lib
          hostPath:
            path: {{ .Values.measurementAgent.nvml.hostLibraryPath }}
            type: File
        {{- end }}
        {{- if $rapl }}
        - name: powercap
          hostPath:
            path: /sys/class/powercap
            type: Directory
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aitra-meter.fullname" . }}-measurement-agent
  namespace: {{ include "aitra-meter.namespace" . }}
  labels:
    {{- include "aitra-meter.labels" . | nindent 4 }}
    app.kubernetes.io/component: measurement-agent
spec:
  # Headless — Prometheus scrapes each pod directly via ServiceMonitor.
  clusterIP: None
  selector:
    {{- include "aitra-meter.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: measurement-agent
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

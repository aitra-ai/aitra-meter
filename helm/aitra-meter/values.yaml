# Aitra Meter Helm chart values
# See docs/spec/aitra-meter-spec-v1.0.md for full specification

cluster:
  # Name of this cluster — used as a label on all measurements
  name: ""

measurementAgent:
  image:
    repository: ghcr.io/aitra-ai/aitra-meter/measurement-agent
    # Defaults to the chart appVersion. Override only to pin a specific image.
    tag: ""
    pullPolicy: IfNotPresent
  # Node selector — DaemonSet only schedules to nodes with this label
  nodeSelector:
    aitra-ai.github.io/gpu: "true"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Energy provider — select based on GPU vendor.
  #
  # nvml  — NVIDIA GPUs (H100, H200, L40S, A100, and any NVML-capable GPU).
  #         Uses go-nvml (github.com/NVIDIA/go-nvml), NVIDIA's official Go
  #         binding for the NVIDIA Management Library. libnvidia-ml.so.1 is
  #         part of the standard NVIDIA driver and is always present on GPU
  #         nodes. No additional installation required.
  #
  # amd   — AMD GPUs (MI300X, MI250X, MI210, RX 7900 series, ROCm 6.x+).
  #         Uses AMD SMI (libamd_smi.so), AMD's recommended C library for GPU
  #         telemetry. libamd_smi.so is shipped with the ROCm stack and is
  #         present on any node running the AMD GPU operator or a manual ROCm
  #         installation. No additional installation required.
  #
  # Inference providers: vllm (default) | generic-prometheus
  energyProvider:
    type: nvml
    config: {}
  # Host energy — energy consumed by everything on the node that is not the
  # accelerator (CPU package, DRAM, and depending on platform the wider board).
  #
  # aitra_j_per_token measures GPU energy only. With a host provider configured,
  # aitra_system_j_per_token reports total system energy per token.
  #
  #   rapl         x86 (Intel and AMD). Reads /sys/class/powercap.
  #   grace-hwmon  Grace Superchip (72-core). Reads hwmon power rails.
  #   none         No host measurement. Host metrics are omitted, not zeroed.
  #
  # Not available on all hardware. NVIDIA GB10 / DGX Spark exposes no host power
  # telemetry, so host metrics are omitted there. This is reported as unavailable
  # and never as zero: a zero would make an unmeasured node look more efficient
  # than a measured one. See docs/guides/host-energy.md.
  hostEnergyProvider:
    type: none
    config: {}
  # NVML library injection (optional). On managed GPU nodes the container runtime
  # mounts libnvidia-ml.so.1 automatically. On kind / bare-metal nodes where it
  # does not, point this at a driver-matched libnvidia-ml.so.1 present on the node
  # and the DaemonSet will mount it into the agent at /opt/nvml (added to
  # LD_LIBRARY_PATH). Leave empty to disable.
  nvml:
    hostLibraryPath: ""
  # The agent is a gRPC-push loop with no HTTP server in this build. Leave false
  # unless a build wires an HTTP health/metrics server on the metrics port.
  httpProbes: false
  # dcgm example (scrape a node-local dcgm-exporter instead of reading NVML in-process):
  # energyProvider:
  #   type: dcgm
  #   config:
  #     endpoint: "http://localhost:9400/metrics"
  inferenceProvider:
    type: vllm
    config:
      endpoint: "http://localhost:8000/metrics"
  # generic-prometheus example (works with TGI, SGLang, Ollama, Triton, any custom server):
  # inferenceProvider:
  #   type: generic-prometheus
  #   config:
  #     endpoint: "http://localhost:8080/metrics"
  #     output_tokens_metric: "tgi_request_generated_tokens_total"
  #     requests_running_metric: "tgi_queue_size"
  #     model_name_label: "model_id"
  # CV gate: flag measurements with rolling CV above this threshold
  cvThreshold: 0.03
  cvWindowSize: 100

aggregationService:
  image:
    repository: ghcr.io/aitra-ai/aitra-meter/aggregation-service
    # Defaults to the chart appVersion. Override only to pin a specific image.
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  port: 8080

dashboard:
  enabled: true
  image:
    repository: ghcr.io/aitra-ai/aitra-meter/dashboard
    # Defaults to the chart appVersion. Override only to pin a specific image.
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  service:
    type: ClusterIP

# Prometheus integration
prometheus:
  serviceMonitor:
    enabled: true
    # Namespace where Prometheus Operator is installed
    namespace: monitoring
    interval: 15s
    scrapeTimeout: 10s

# Grafana dashboard provisioning.
# When enabled, all dashboard JSON files in files/ (overview, cost attribution,
# AI efficiency, hardware efficiency) are rendered into a ConfigMap labelled for
# the Grafana dashboard sidecar (kube-prometheus-stack ships it by default), so
# the dashboards appear in Grafana without a manual import step.
grafana:
  enabled: false
  # Label key/value the Grafana sidecar watches for on dashboard ConfigMaps.
  # kube-prometheus-stack default: grafana_dashboard=1.
  sidecarLabel: grafana_dashboard
  sidecarLabelValue: "1"
  # Optional Grafana folder for the provisioned dashboards (grafana_folder
  # annotation, honoured by the sidecar). Empty = Grafana default folder.
  folder: ""

# Storage backend — SQLite by default (embedded, no infrastructure required).
storage:
  backend: sqlite
  config:
    path: /data/aitra.db

# OpenTelemetry OTLP export — opt-in, default disabled.
# When enabled, the aggregation service emits gen_ai.infrastructure.energy.*
# metrics via OTLP in addition to Prometheus. Both pipelines run simultaneously.
otel:
  enabled: false
  # OTLP gRPC receiver endpoint (without scheme).
  # Example: otel-collector.monitoring.svc.cluster.local:4317
  endpoint: ""
  # Set true for in-cluster collectors without TLS.
  insecure: true

# Site configuration — maps to SiteConfig CRD
siteConfig:
  gridZone: ""
  electricityCostPerKwh: 0.12
  pue: 1.35
  carbonIntensityFallback: 400
  carbonSource: electricitymaps

# Per-namespace 24h inference-energy cost budgets (USD), keyed by namespace name.
# Each entry renders an aitra_tenant_cost_budget_usd_24h recording rule (see
# templates/prometheusrule.yaml) that the TenantCostBudgetExceeded alert compares
# against. Empty = no budget rules rendered. See docs/guides/cost-budgets.md.
# Example:
#   costBudgets:
#     inference-prod: 500
#     inference-fin: 250
costBudgets: {}

# External API credentials
externalApis:
  electricityMaps:
    enabled: true
    secretName: aitra-electricitymaps-token
    secretKey: token
  wattTime:
    enabled: false
    secretName: aitra-watttime-credentials
  openEI:
    enabled: false

airGapped:
  enabled: false

# Default MeasurementPolicy
measurementPolicy:
  defaultAttributionMethod: direct
  calibration:
    preferredTier: aitra_benchmark
  budget:
    enabled: false
    namespaces: []

namespaceOverride: ""

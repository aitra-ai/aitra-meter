# Aitra Meter Helm chart values
# See docs/spec/aitra-meter-spec-v1.0.md for full specification

cluster:
  # Name of this cluster — used as a label on all measurements
  name: ""

measurementAgent:
  image:
    repository: ghcr.io/aitra-ai/aitra-meter/measurement-agent
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  # Node selector — DaemonSet only schedules to nodes with this label
  nodeSelector:
    aitra-ai.github.io/gpu: "true"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Energy provider — select based on GPU vendor.
  #
  # nvml  — NVIDIA GPUs (H100, H200, L40S, A100, and any NVML-capable GPU).
  #         Uses go-nvml (github.com/NVIDIA/go-nvml), NVIDIA's official Go
  #         binding for the NVIDIA Management Library. libnvidia-ml.so.1 is
  #         part of the standard NVIDIA driver and is always present on GPU
  #         nodes. No additional installation required.
  #
  # amd   — AMD GPUs (MI300X, MI250X, MI210, RX 7900 series, ROCm 6.x+).
  #         Uses AMD SMI (libamd_smi.so), AMD's recommended C library for GPU
  #         telemetry. libamd_smi.so is shipped with the ROCm stack and is
  #         present on any node running the AMD GPU operator or a manual ROCm
  #         installation. No additional installation required.
  #
  # Inference providers: vllm (default) | generic-prometheus
  energyProvider:
    type: nvml
    config: {}
  # dcgm example (scrape a node-local dcgm-exporter instead of reading NVML in-process):
  # energyProvider:
  #   type: dcgm
  #   config:
  #     endpoint: "http://localhost:9400/metrics"
  inferenceProvider:
    type: vllm
    config:
      endpoint: "http://localhost:8000/metrics"
  # generic-prometheus example (works with TGI, SGLang, Ollama, Triton, any custom server):
  # inferenceProvider:
  #   type: generic-prometheus
  #   config:
  #     endpoint: "http://localhost:8080/metrics"
  #     output_tokens_metric: "tgi_request_generated_tokens_total"
  #     requests_running_metric: "tgi_queue_size"
  #     model_name_label: "model_id"
  # CV gate: flag measurements with rolling CV above this threshold
  cvThreshold: 0.03
  cvWindowSize: 100

aggregationService:
  image:
    repository: ghcr.io/aitra-ai/aitra-meter/aggregation-service
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  port: 8080

dashboard:
  enabled: true
  image:
    repository: ghcr.io/aitra-ai/aitra-meter/dashboard
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  service:
    type: ClusterIP

# Prometheus integration
prometheus:
  serviceMonitor:
    enabled: true
    # Namespace where Prometheus Operator is installed
    namespace: monitoring
    interval: 15s
    scrapeTimeout: 10s

# Storage backend — SQLite by default (embedded, no infrastructure required).
storage:
  backend: sqlite
  config:
    path: /data/aitra.db

# OpenTelemetry OTLP export — opt-in, default disabled.
# When enabled, the aggregation service emits gen_ai.infrastructure.energy.*
# metrics via OTLP in addition to Prometheus. Both pipelines run simultaneously.
otel:
  enabled: false
  # OTLP gRPC receiver endpoint (without scheme).
  # Example: otel-collector.monitoring.svc.cluster.local:4317
  endpoint: ""
  # Set true for in-cluster collectors without TLS.
  insecure: true

# Site configuration — maps to SiteConfig CRD
siteConfig:
  gridZone: ""
  electricityCostPerKwh: 0.12
  pue: 1.35
  carbonIntensityFallback: 400
  carbonSource: electricitymaps

# Per-namespace 24h inference-energy cost budgets (USD), keyed by namespace name.
# Each entry renders an aitra_tenant_cost_budget_usd_24h recording rule (see
# templates/prometheusrule.yaml) that the TenantCostBudgetExceeded alert compares
# against. Empty = no budget rules rendered. See docs/guides/cost-budgets.md.
# Example:
#   costBudgets:
#     inference-prod: 500
#     inference-fin: 250
costBudgets: {}

# External API credentials
externalApis:
  electricityMaps:
    enabled: true
    secretName: aitra-electricitymaps-token
    secretKey: token
  wattTime:
    enabled: false
    secretName: aitra-watttime-credentials
  openEI:
    enabled: false

airGapped:
  enabled: false

# Default MeasurementPolicy
measurementPolicy:
  defaultAttributionMethod: direct
  calibration:
    preferredTier: aitra_benchmark
  budget:
    enabled: false
    namespaces: []

namespaceOverride: ""

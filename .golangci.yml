version: "2"
run:
  go: "1.22"
linters:
  enable:
    - exhaustive
    - gosec
    - misspell
    - revive
  settings:
    gosec:
      excludes:
        - G115
    revive:
      rules:
        - name: exported
          severity: warning
          # Provider types are deliberately named <Vendor>Provider (NVMLProvider,
          # ZeusProvider, DCGMProvider, …) for clarity at call sites; keep the
          # exported-doc check but allow that intentional stutter.
          arguments:
            - disableStutteringCheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/aitra-ai/aitra-meter
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

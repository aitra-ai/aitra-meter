# Grafana for the KubeCon demo surface (meter.aitra.ai → this, read-only).
#
# - Anonymous access = Viewer only; editing requires the admin login.
# - Datasource: the in-cluster aitra-meter Prometheus (deploy/prometheus.yaml),
#   provisioned with uid "prometheus" — the demo dashboards reference that uid.
# - Dashboards: provisioned from the ConfigMap `aitra-demo-dashboards`.
#   Create/update it from the JSON files in deploy/grafana-dashboards/:
#     kubectl -n aitra-system create configmap aitra-demo-dashboards \
#       --from-file=deploy/grafana-dashboards/ \
#       --dry-run=client -o yaml | kubectl apply -f -
# - Admin password: create the secret before applying —
#     kubectl -n aitra-system create secret generic grafana-admin \
#       --from-literal=password='<choose one>'
# - Exposed on NodePort 30852 (dashboard app stays on 30851).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: aitra-system
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://aitra-meter-prometheus.aitra-system:9090
        isDefault: true
        editable: false
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: aitra-demo
        folder: KubeCon Demo
        type: file
        disableDeletion: true
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: aitra-system
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_AUTH_BASIC_ENABLED
              value: "true"
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/demo-a-fleet.json
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasource.yaml
                path: datasource.yaml
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards
          configMap:
            name: aitra-demo-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: aitra-system
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30852

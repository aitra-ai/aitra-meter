      table{border-collapse:collapse;width:100%;font-size:13px;font-variant-numeric:tabular-nums}
      th{color:var(--soft);text-align:left;font-weight:600;font-size:11.5px;letter-spacing:.08em;
         padding:6px 10px 6px 0;border-bottom:1px solid var(--line)}
      td{padding:7px 10px 7px 0;border-bottom:1px solid var(--line);
         font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
      .st-running{color:var(--ok)} .st-pending{color:var(--accent)} .st-done{color:var(--soft)} .st-failed{color:var(--warn)}
      .stats{display:flex;gap:26px;flex-wrap:wrap;font-family:ui-monospace,Menlo,monospace;font-size:13px}
      .stats b{font-size:19px;color:var(--accent)}
      a{color:var(--tele)}
    </style></head><body><main>
      <div class="top"><div>
        <h1>⚡ <span data-i18n="title"></span></h1>
        <div class="sub"><span data-i18n="sub"></span>
          <a id="glink" href="#" target="_blank" data-i18n="grafana"></a>.</div>
      </div><button id="lang">EN</button></div>

      <div class="card"><div class="lbl" data-i18n="s1"></div><div class="grid" id="models"></div></div>
      <div class="card"><div class="lbl" data-i18n="s2"></div><div class="grid" id="shapes"></div></div>
      <div class="card"><div class="lbl" data-i18n="s3"></div><div class="grid narrow" id="conc"></div></div>
      <div class="card"><div class="lbl" data-i18n="s4"></div><div class="grid" id="durs"></div></div>

      <div class="row">
        <button id="go" data-i18n="go"></button>
        <button class="scenebtn" data-scene="sweep">📈 <span data-i18n="sweep"></span></button>
        <button class="scenebtn" data-scene="burst">💓 <span data-i18n="burst"></span></button>
        <button id="stop" data-i18n="stop"></button>
      </div>
      <div id="msg"></div>

      <div class="card"><div class="lbl" data-i18n="idleTitle"></div>
        <div class="row" style="margin-top:4px">
          <button id="lg">…</button>
          <span style="font-size:13px;color:var(--soft)" data-i18n="idleDesc"></span>
        </div>
      </div>

      <div class="card"><div class="lbl" data-i18n="statusTitle"></div>
        <div class="stats" id="stats"></div>
        <table style="margin-top:12px"><thead><tr><th data-i18n="thJob"></th><th data-i18n="thModel"></th><th data-i18n="thDesc"></th><th data-i18n="thState"></th></tr></thead>
        <tbody id="jobs"><tr><td colspan="4" style="color:var(--soft)">…</td></tr></tbody></table>
      </div>

      <div class="card"><div class="lbl" data-i18n="jptTitle"></div>
        <table><thead><tr><th data-i18n="thModel"></th><th>J/token</th></tr></thead>
        <tbody id="jpt"></tbody></table>
      </div>
    <script>
      const I18N = {
        zh: {
          title:'演示流量控制台', sub:'模型 × 任务形态 × 并发 × 时长,自由组合;或用预排场景。曲线看 ',
          grafana:'Grafana Demo 仪表盘',
          s1:'① 模型(可多选——同场景打到多个模型做对比)', s2:'② 任务形态',
          s3:'③ 并发(同时在飞的请求数)', s4:'④ 时长',
          go:'▶ 启动组合', sweep:'并发扫描 1→32', burst:'脉冲 ×8', stop:'■ 全部停止',
          idleTitle:'空载控制(常驻底噪流量)',
          idleDesc:'关闭后约 1 分钟:所有模型吞吐归零、J/token 归零、功率显示占卡静息值——空载演示入口。',
          statusTitle:'当前状态', jptTitle:'实时 J/token(30 秒窗口)',
          thJob:'任务', thModel:'模型', thDesc:'内容', thState:'状态',
          servingW:'干活功率', idleW:'待机功率', baseline:'底噪流量', on:'开', off:'关',
          lgOn:'⏻ 关闭底噪(进入空载)', lgOff:'⏻ 打开底噪(恢复常态)',
          pickModel:'请先选择至少一个模型(可多选)', starting:'启动中…',
          started:n=>`✓ 已启动 ${n} 个任务`, stopped:n=>`■ 已停止 ${n} 个任务`,
          noJobs:'当前没有演示任务', lgClosing:'正在关闭底噪…', lgOpening:'正在恢复底噪…',
          lgClosed:'✓ 底噪已关——约 1 分钟后进入空载形态', lgOpened:'✓ 底噪已恢复',
          shapeDesc:{balanced:'输入512/输出256', summarize:'输入4096/输出64(重读)',
                     generate:'输入64/输出1024(重写)', sharegpt:'ShareGPT 真人对话'},
        },
        en: {
          title:'Demo Traffic Console', sub:'Combine model × shape × concurrency × duration, or use a scene. Watch curves on the ',
          grafana:'Grafana demo dashboards',
          s1:'① Models (multi-select — same scenario across models for comparison)', s2:'② Task shape',
          s3:'③ Concurrency (requests in flight)', s4:'④ Duration',
          go:'▶ Start', sweep:'Sweep 1→32', burst:'Burst ×8', stop:'■ Stop all',
          idleTitle:'Idle control (baseline traffic)',
          idleDesc:'Turn off and within ~1 min every model reads zero throughput and zero J/token while power shows the true resting draw — the idle-state demo.',
          statusTitle:'Current state', jptTitle:'Live J/token (30 s windows)',
          thJob:'Job', thModel:'Model', thDesc:'What', thState:'State',
          servingW:'Serving power', idleW:'Idle power', baseline:'Baseline traffic', on:'on', off:'off',
          lgOn:'⏻ Turn baseline off (go idle)', lgOff:'⏻ Turn baseline on (resume)',
          pickModel:'Select at least one model first', starting:'Starting…',
          started:n=>`✓ Started ${n} job(s)`, stopped:n=>`■ Stopped ${n} job(s)`,
          noJobs:'No demo jobs running', lgClosing:'Turning baseline off…', lgOpening:'Turning baseline on…',
          lgClosed:'✓ Baseline off — idle state in ~1 min', lgOpened:'✓ Baseline restored',
          shapeDesc:{balanced:'in 512 / out 256', summarize:'in 4096 / out 64 (read-heavy)',
                     generate:'in 64 / out 1024 (write-heavy)', sharegpt:'ShareGPT real dialogues'},
        },
      };
      let lang = localStorage.getItem('demo_lang') ||
                 (navigator.language && navigator.language.startsWith('zh') ? 'zh' : 'en');
      const T = () => I18N[lang];
      function applyStatic() {
        document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T()[el.dataset.i18n] || ''; });
        document.getElementById('lang').textContent = lang === 'zh' ? 'EN' : '中文';
        document.documentElement.lang = lang;
      }
      const GRAFANA = localStorage.getItem('grafana_url') || 'https://meter.aitra.ai';
      document.getElementById('glink').href = GRAFANA + '/d/aitra-demo-a';
      let sel = {models: new Set(), shape: 'balanced', concurrency: 8, duration: 'forever'};
      let statusCache = null;

      function pill(txt, key, group, desc) {
        const d = document.createElement('div');
        d.className = 'opt'; d.innerHTML = txt + (desc ? `<small>${desc}</small>` : '');
        d.dataset.key = key;
        d.onclick = () => {
          if (group === 'model') {
            d.classList.toggle('sel');
            if (sel.models.has(key)) sel.models.delete(key); else sel.models.add(key);
          } else {
            sel[group] = (group === 'concurrency') ? parseInt(key) : key;
            d.parentNode.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
            d.classList.add('sel');
          }
        };
        return d;
      }
      function buildPickers(s) {
        const mBox = document.getElementById('models'); mBox.innerHTML = '';
        s.models.forEach(m => {
          const p = pill(m, m, 'model');
          if (sel.models.has(m)) p.classList.add('sel');
          mBox.appendChild(p);
        });
        const shBox = document.getElementById('shapes'); shBox.innerHTML = '';
        Object.entries(s.shapes).forEach(([k, lbls]) => {
          const p = pill(lbls[lang], k, 'shape', T().shapeDesc[k] || '');
          if (k === sel.shape) p.classList.add('sel');
          shBox.appendChild(p);
        });
        const cBox = document.getElementById('conc'); cBox.innerHTML = '';
        s.concurrency.forEach(c => {
          const p = pill(String(c), String(c), 'concurrency');
          if (c === sel.concurrency) p.classList.add('sel');
          cBox.appendChild(p);
        });
        const dBox = document.getElementById('durs'); dBox.innerHTML = '';
        Object.entries(s.durations).forEach(([k, lbls]) => {
          const p = pill(lbls[lang], k, 'duration');
          if (k === sel.duration) p.classList.add('sel');
          dBox.appendChild(p);
        });
      }
      async function refresh() {
        try {
          const r = await fetch('api/status');
          if (r.status === 401) { location.reload(); return; }
          const s = await r.json(); statusCache = s;
          buildPickers(s);
          const jb = document.getElementById('jobs');
          jb.innerHTML = s.jobs.length ? s.jobs.map(j =>
            `<tr><td>${j.name}</td><td>${j.model}</td><td>${j.desc}</td><td class="st-${j.state}">${j.state}</td></tr>`
          ).join('') : `<tr><td colspan="4" style="color:var(--soft)">${T().noJobs}</td></tr>`;
          const jt = document.getElementById('jpt');
          jt.innerHTML = Object.entries(s.jpt).sort((a,b)=>a[1]-b[1]).map(([m,v]) =>
            `<tr><td>${m}</td><td>${v}</td></tr>`).join('');
          const st = document.getElementById('stats');
          const p = s.power || {};
          st.innerHTML = `<span>${T().servingW} <b>${p.serving ?? '—'}</b> W</span>` +
                         `<span>${T().idleW} <b>${p.idle ?? '—'}</b> W</span>` +
                         `<span>${T().baseline} <b>${s.loadgen > 0 ? T().on : T().off}</b></span>`;
          const lg = document.getElementById('lg');
          lg.textContent = s.loadgen > 0 ? T().lgOn : T().lgOff;
          lg.className = s.loadgen > 0 ? '' : 'off';
          lg.dataset.on = s.loadgen > 0 ? '1' : '0';
        } catch (e) { /* keep last view */ }
      }
      const msg = document.getElementById('msg');
      function say(t, cls) { msg.textContent = t; msg.className = cls || ''; }
      async function post(path, body) {
        const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body || {})});
        return r.json();
      }
      function report(d) {
        const ok = (d.started || []).length;
        let t = ok ? T().started(ok) : '';
        if (d.errors && d.errors.length) t += (t ? ' · ' : '✗ ') + d.errors.join(' · ');
        say(t || '✗', d.errors && !ok ? 'err' : 'ok');
      }
      document.getElementById('go').onclick = async () => {
        if (!sel.models.size) { say(T().pickModel, 'err'); return; }
        say(T().starting);
        const d = await post('api/start',
          {models: [...sel.models], shape: sel.shape, concurrency: sel.concurrency, duration: sel.duration});
        report(d); refresh();
      };
      document.querySelectorAll('.scenebtn').forEach(b => b.onclick = async () => {
        if (!sel.models.size) { say(T().pickModel, 'err'); return; }
        say(T().starting);
        const d = await post('api/start',
          {models: [...sel.models], shape: sel.shape, scene: b.dataset.scene});
        report(d); refresh();
      });
      document.getElementById('stop').onclick = async () => {
        const d = await post('api/stop');
        say(T().stopped(d.stopped || 0), 'ok'); refresh();
      };
      document.getElementById('lg').onclick = async (e) => {
        const on = e.target.dataset.on === '1';
        say(on ? T().lgClosing : T().lgOpening);
        const d = await post('api/loadgen', {on: !on});
        say(d.error ? ('✗ ' + d.error) : (on ? T().lgClosed : T().lgOpened), d.error ? 'err' : 'ok');
        refresh();
      };
      document.getElementById('lang').onclick = () => {
        lang = lang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('demo_lang', lang);
        applyStatic();
        if (statusCache) buildPickers(statusCache);
        refresh();
      };
      applyStatic(); refresh(); setInterval(refresh, 5000);
    </script></main></body></html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-control
  namespace: aitra-system
  labels:
    app: demo-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-control
  template:
    metadata:
      labels:
        app: demo-control
    spec:
      serviceAccountName: demo-control
      nodeSelector:
        kubernetes.io/hostname: xspark
      containers:
        - name: panel
          image: vllm/vllm-openai:v0.19.0
          imagePullPolicy: Never
          command: ["python3", "/app/app.py"]
          env:
            - name: PROM_URL
              value: "http://aitra-meter-prometheus:9090"
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-control-key
                  key: key
                  optional: true   # absent Secret = open LAN mode
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: app
          configMap:
            name: demo-control-app
---
apiVersion: v1
kind: Service
metadata:
  name: demo-control
  namespace: aitra-system
  labels:
    app: demo-control
spec:
  type: NodePort
  selector:
    app: demo-control
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30853

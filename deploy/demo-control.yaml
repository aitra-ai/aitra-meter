# Demo traffic control panel — LAN-only web UI to trigger predefined load
# scenarios against the fleet, KubeCon booth edition.
#
# Security model (the sol.aitra.ai brief, scaled to LAN):
#   - whitelisted dimensions only: 8 models × 4 task shapes × 6 concurrency
#     steps + 2 orchestrated scenes; nothing free-form reaches a shell
#   - every job carries activeDeadlineSeconds (hard cap) + TTL cleanup
#   - one job per model, 8 jobs globally, enforced server-side
#   - kill switch deletes everything with one click
#   - baseline-loadgen toggle may scale exactly ONE deployment
#     (vllm-fleet-loadgen), enforced by RBAC resourceNames
#   - NodePort 30853, INTERNAL NETWORK ONLY — do not tunnel this without auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-control
  namespace: aitra-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-control
  namespace: aitra-system
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["vllm-fleet-loadgen"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["vllm-fleet-loadgen"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-control
  namespace: aitra-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-control
subjects:
  - kind: ServiceAccount
    name: demo-control
    namespace: aitra-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-control-app
  namespace: aitra-system
data:
  app.py: |
    #!/usr/bin/env python3
    """Demo traffic control panel. Stdlib only. Whitelisted dimensions only."""
    import json, os, ssl, time, urllib.request, urllib.parse, urllib.error
    from http.server import HTTPServer, BaseHTTPRequestHandler

    NS = "aitra-system"
    K8S = "https://kubernetes.default.svc"
    SA = "/var/run/secrets/kubernetes.io/serviceaccount"
    PROM = os.environ.get("PROM_URL", "http://aitra-meter-prometheus:9090")
    VLLM_IMAGE = os.environ.get("VLLM_IMAGE", "vllm/vllm-openai:v0.19.0")
    MAX_JOBS = 8   # allow whole-fleet comparisons
    LOADGEN = "vllm-fleet-loadgen"

    with open(SA + "/token") as f:
        TOKEN = f.read().strip()
    SSLCTX = ssl.create_default_context(cafile=SA + "/ca.crt")

    # -------- whitelists --------
    MODELS = {
        "qwen3.5-0.8b":            ("vllm-q35-0p8b",     "q35-0p8b"),
        "qwen3.5-2b":              ("vllm-q35-2b",       "q35-2b"),
        "qwen3.5-4b":              ("vllm-q35-4b",       "q35-4b"),
        "qwen3.5-9b":              ("vllm-q35-9b",       "q35-9b"),
        "qwen3.6-27b":             ("vllm-q36-27b",      "q36-27b"),
        "qwen3.6-27b-fp8":         ("vllm-q36-27b-fp8",  "q36-27b-fp8"),
        "qwen3.6-35b-a3b-fp8":     ("vllm-q36-35b-fp8",  "q36-35b-fp8"),
        "qwen3.5-122b-a10b-int4":  ("vllm-q35-122b-int4","q35-122b-int4"),
    }

    BASE = ("vllm bench serve --backend openai --base-url http://%(svc)s:8000 "
            "--endpoint /v1/completions --model %(model)s --tokenizer /models/%(dir)s ")

    # Task shapes: how each request looks (input tokens / output tokens)
    SHAPES = {
        "balanced":  {"label": "均衡对话", "args": "--dataset-name random --random-input-len 512 --random-output-len 256 "},
        "summarize": {"label": "长文摘要", "args": "--dataset-name random --random-input-len 4096 --random-output-len 64 "},
        "generate":  {"label": "长文生成", "args": "--dataset-name random --random-input-len 64 --random-output-len 1024 "},
        "sharegpt":  {"label": "真实对话", "args": "--dataset-name sharegpt --dataset-path /datasets/sharegpt_10k.json "},
    }
    CONCURRENCY = [1, 4, 8, 16, 32, 64]
    RUN_SECONDS = 300  # each custom run: 5 minutes

    # Orchestrated scenes (use the selected model + shape)
    SCENES = {
        "sweep": {"label": "并发扫描 1→32(约 12 分钟)", "deadline": 1800,
                  "script": "for C in 1 2 4 8 16 32; do %(bench)s--max-concurrency $C --num-prompts $((C*30)); sleep 60; done"},
        "burst": {"label": "脉冲流量 ×8(满载 30s/静默 60s)", "deadline": 1400,
                  "script": "for i in 1 2 3 4 5 6 7 8; do %(bench)s--max-concurrency 32 --num-prompts 120; sleep 60; done"},
    }

    # -------- k8s helpers --------
    def k8s(method, path, body=None, ctype="application/json"):
        req = urllib.request.Request(K8S + path, method=method)
        req.add_header("Authorization", "Bearer " + TOKEN)
        req.add_header("Content-Type", ctype)
        data = json.dumps(body).encode() if body is not None else None
        with urllib.request.urlopen(req, data=data, context=SSLCTX, timeout=15) as r:
            return json.loads(r.read())

    def list_jobs():
        out = []
        res = k8s("GET", f"/apis/batch/v1/namespaces/{NS}/jobs?labelSelector=app=demo-load")
        for j in res.get("items", []):
            st = j.get("status", {})
            state = "running"
            for c in st.get("conditions", []) or []:
                if c.get("type") == "Complete" and c.get("status") == "True":
                    state = "done"
                if c.get("type") == "Failed" and c.get("status") == "True":
                    state = "failed"
            if state == "running" and not st.get("active"):
                state = "pending"
            ann = j["metadata"].get("annotations") or {}
            out.append({
                "name": j["metadata"]["name"],
                "model": j["metadata"]["labels"].get("demo-model", "?"),
                "desc": ann.get("demo-desc", "?"),
                "state": state,
            })
        return out

    def make_job(name, model, desc, script, deadline):
        job = {
            "apiVersion": "batch/v1", "kind": "Job",
            "metadata": {"name": name, "namespace": NS,
                         "labels": {"app": "demo-load", "demo-model": model},
                         "annotations": {"demo-desc": desc}},
            "spec": {
                "activeDeadlineSeconds": deadline,
                "ttlSecondsAfterFinished": 900,
                "backoffLimit": 0,
                "template": {
                    "metadata": {"labels": {"app": "demo-load"}},
                    "spec": {
                        "restartPolicy": "Never",
                        "nodeSelector": {"kubernetes.io/hostname": "xspark"},
                        "containers": [{
                            "name": "bench",
                            "image": VLLM_IMAGE,
                            "imagePullPolicy": "Never",
                            "command": ["/bin/sh", "-c", script],
                            "env": [{"name": "HF_HUB_OFFLINE", "value": "1"}],
                            "volumeMounts": [{"name": "models", "mountPath": "/models", "readOnly": True},
                                              {"name": "datasets", "mountPath": "/datasets", "readOnly": True}],
                            "resources": {"requests": {"cpu": "500m", "memory": "1Gi"},
                                           "limits": {"cpu": "4", "memory": "8Gi"}},
                        }],
                        "volumes": [{"name": "models",
                                     "hostPath": {"path": "/root/aitra-models", "type": "Directory"}},
                                    {"name": "datasets",
                                     "hostPath": {"path": "/root/aitra-datasets", "type": "Directory"}}],
                    },
                },
            },
        }
        k8s("POST", f"/apis/batch/v1/namespaces/{NS}/jobs", job)

    def guard(model):
        active = [j for j in list_jobs() if j["state"] in ("running", "pending")]
        if len(active) >= MAX_JOBS:
            return f"已有 {len(active)} 个任务在跑(上限 {MAX_JOBS}),请先停止"
        if any(j["model"] == model for j in active):
            return f"{model} 已有任务在跑"
        return None

    def start_custom(model, shape, conc):
        if model not in MODELS or shape not in SHAPES or conc not in CONCURRENCY:
            return None, "非法参数(不在白名单)"
        err = guard(model)
        if err:
            return None, err
        svc, mdir = MODELS[model]
        bench = (BASE + SHAPES[shape]["args"]) % {"svc": svc, "model": model, "dir": mdir}
        script = (f"end=$((SECONDS+{RUN_SECONDS})); while [ $SECONDS -lt $end ]; do "
                  f"{bench}--max-concurrency {conc} --num-prompts {conc*20}; done")
        desc = f"{SHAPES[shape]['label']}·并发{conc}·5分钟"
        name = f"demo-c{conc}-{shape}-{mdir}-{int(time.time())%100000}".lower().replace(".", "-")
        make_job(name, model, desc, script, RUN_SECONDS + 240)
        return name, None

    def start_scene(model, shape, scene):
        if model not in MODELS or shape not in SHAPES or scene not in SCENES:
            return None, "非法参数(不在白名单)"
        err = guard(model)
        if err:
            return None, err
        svc, mdir = MODELS[model]
        bench = (BASE + SHAPES[shape]["args"]) % {"svc": svc, "model": model, "dir": mdir}
        sc = SCENES[scene]
        script = sc["script"] % {"bench": bench}
        desc = f"{sc['label']}·{SHAPES[shape]['label']}"
        name = f"demo-{scene}-{mdir}-{int(time.time())%100000}".lower().replace(".", "-")
        make_job(name, model, desc, script, sc["deadline"])
        return name, None

    def stop_all():
        n = 0
        for j in list_jobs():
            try:
                k8s("DELETE", f"/apis/batch/v1/namespaces/{NS}/jobs/{j['name']}?propagationPolicy=Background")
                n += 1
            except urllib.error.HTTPError:
                pass
        return n

    def loadgen_replicas():
        try:
            d = k8s("GET", f"/apis/apps/v1/namespaces/{NS}/deployments/{LOADGEN}")
            return d.get("spec", {}).get("replicas", 0)
        except Exception:
            return -1

    def loadgen_set(on):
        body = {"spec": {"replicas": 1 if on else 0}}
        k8s("PATCH", f"/apis/apps/v1/namespaces/{NS}/deployments/{LOADGEN}/scale",
            body, ctype="application/merge-patch+json")

    def prom_query(q):
        url = PROM + "/api/v1/query?query=" + urllib.parse.quote(q)
        with urllib.request.urlopen(url, timeout=6) as r:
            return json.loads(r.read())["data"]["result"]

    def prom_jpt():
        try:
            return {x["metric"].get("model", "?"): round(float(x["value"][1]), 2)
                    for x in prom_query("aitra_j_per_token")}
        except Exception:
            return {}

    def prom_power():
        try:
            serving = float(prom_query('sum(aitra_gpu_power_watts{gpu_id!="idle"})')[0]["value"][1])
            idle = float(prom_query("sum(aitra_idle_power_watts)")[0]["value"][1])
            return {"serving": round(serving), "idle": round(idle)}
        except Exception:
            return {}

    # -------- http --------
    with open("/app/index.html", "rb") as f:
        INDEX = f.read()

    class H(BaseHTTPRequestHandler):
        def log_message(self, *a):
            pass
        def _json(self, obj, code=200):
            b = json.dumps(obj, ensure_ascii=False).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json; charset=utf-8")
            self.send_header("Content-Length", str(len(b)))
            self.end_headers()
            self.wfile.write(b)
        def do_GET(self):
            if self.path == "/" or self.path.startswith("/index"):
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.send_header("Content-Length", str(len(INDEX)))
                self.end_headers()
                self.wfile.write(INDEX)
            elif self.path == "/api/status":
                self._json({"jobs": list_jobs(), "jpt": prom_jpt(), "power": prom_power(),
                            "loadgen": loadgen_replicas(),
                            "models": list(MODELS),
                            "shapes": {k: v["label"] for k, v in SHAPES.items()},
                            "concurrency": CONCURRENCY,
                            "scenes": {k: v["label"] for k, v in SCENES.items()}})
            else:
                self._json({"error": "not found"}, 404)
        def do_POST(self):
            ln = int(self.headers.get("Content-Length", 0) or 0)
            try:
                body = json.loads(self.rfile.read(ln) or b"{}")
            except Exception:
                body = {}
            if self.path == "/api/start":
                models = body.get("models")
                if not isinstance(models, list) or not models:
                    models = [body.get("model", "")]
                started, errors = [], []
                for m in models[:8]:
                    m = str(m)
                    if body.get("scene"):
                        name, err = start_scene(m, str(body.get("shape", "balanced")),
                                                str(body.get("scene")))
                    else:
                        try:
                            conc = int(body.get("concurrency", 0))
                        except Exception:
                            conc = 0
                        name, err = start_custom(m, str(body.get("shape", "")), conc)
                    if err:
                        errors.append(f"{m}: {err}")
                    else:
                        started.append(name)
                resp = {"started": started}
                if errors:
                    resp["errors"] = errors
                self._json(resp, 200 if started else 400)
            elif self.path == "/api/stop":
                self._json({"stopped": stop_all()})
            elif self.path == "/api/loadgen":
                try:
                    loadgen_set(bool(body.get("on")))
                    self._json({"loadgen": loadgen_replicas()})
                except Exception as e:
                    self._json({"error": str(e)}, 500)
            else:
                self._json({"error": "not found"}, 404)

    print("demo-control listening on :8080", flush=True)
    HTTPServer(("0.0.0.0", 8080), H).serve_forever()
  index.html: |
    <!doctype html><html lang="zh"><head><meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Aitra Meter · 演示流量控制台</title>
    <style>
      :root{--bg:#14181A;--surface:#1C2225;--ink:#E8E6E0;--soft:#9AA4A8;--line:#2E3639;
            --accent:#E8A020;--accent-soft:#3A2F18;--tele:#4FB3B8;--warn:#E0705F;--ok:#5FBF8A}
      *{box-sizing:border-box}
      body{margin:0;background:var(--bg);color:var(--ink);
           font:15px/1.7 "PingFang SC","Microsoft YaHei",system-ui,sans-serif;padding:28px 20px 60px}
      main{max-width:780px;margin:0 auto}
      h1{font-size:22px;margin:0 0 4px}
      .sub{color:var(--soft);font-size:13px;margin-bottom:22px}
      .card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px 20px;margin:12px 0}
      .lbl{font-size:12px;letter-spacing:.1em;color:var(--accent);font-weight:600;margin-bottom:10px}
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
      .grid.narrow{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}
      .opt{border:1px solid var(--line);border-radius:6px;padding:8px 10px;cursor:pointer;
           font-family:ui-monospace,Menlo,monospace;font-size:12.5px;text-align:center;user-select:none}
      .opt.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700}
      .opt small{display:block;font-family:inherit;color:var(--soft);font-size:10.5px}
      .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;align-items:center}
      button{border:0;border-radius:6px;padding:11px 24px;font-size:15px;font-weight:700;cursor:pointer}
      #go{background:var(--accent);color:#14181A}
      #stop{background:transparent;color:var(--warn);border:1px solid var(--warn)}
      .scenebtn{background:transparent;color:var(--tele);border:1px solid var(--tele);font-size:13px;padding:9px 16px}
      #lg{background:transparent;border:1px solid var(--soft);color:var(--ink);font-size:13px;padding:9px 16px}
      #lg.off{border-color:var(--warn);color:var(--warn)}
      #msg{font-size:13.5px;margin-top:10px;min-height:20px}
      #msg.err{color:var(--warn)} #msg.ok{color:var(--ok)}
      table{border-collapse:collapse;width:100%;font-size:13px;font-variant-numeric:tabular-nums}
      th{color:var(--soft);text-align:left;font-weight:600;font-size:11.5px;letter-spacing:.08em;
         padding:6px 10px 6px 0;border-bottom:1px solid var(--line)}
      td{padding:7px 10px 7px 0;border-bottom:1px solid var(--line);
         font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
      .st-running{color:var(--ok)} .st-pending{color:var(--accent)} .st-done{color:var(--soft)} .st-failed{color:var(--warn)}
      .stats{display:flex;gap:26px;flex-wrap:wrap;font-family:ui-monospace,Menlo,monospace;font-size:13px}
      .stats b{font-size:19px;color:var(--accent)}
      a{color:var(--tele)}
    </style></head><body><main>
      <h1>⚡ 演示流量控制台</h1>
      <div class="sub">模型 × 任务形态 × 并发,自由组合(每次 5 分钟);或用预排场景。曲线看
        <a id="glink" href="#" target="_blank">Grafana Demo 仪表盘</a>。</div>

      <div class="card"><div class="lbl">① 模型(可多选——同场景打到多个模型做对比)</div><div class="grid" id="models"></div></div>
      <div class="card"><div class="lbl">② 任务形态</div><div class="grid" id="shapes"></div></div>
      <div class="card"><div class="lbl">③ 并发(同时在飞的请求数)</div><div class="grid narrow" id="conc"></div></div>

      <div class="row">
        <button id="go">▶ 启动组合(5 分钟)</button>
        <button class="scenebtn" data-scene="sweep">📈 并发扫描 1→32</button>
        <button class="scenebtn" data-scene="burst">💓 脉冲 ×8</button>
        <button id="stop">■ 全部停止</button>
      </div>
      <div id="msg"></div>

      <div class="card"><div class="lbl">空载控制(常驻底噪流量)</div>
        <div class="row" style="margin-top:4px">
          <button id="lg">…</button>
          <span style="font-size:13px;color:var(--soft)">
            关闭后约 1 分钟:所有模型吞吐归零、进入"占卡静息"状态——演示空载功耗与 serving/idle 对比的入口。</span>
        </div>
      </div>

      <div class="card"><div class="lbl">当前状态</div>
        <div class="stats" id="stats"></div>
        <table style="margin-top:12px"><thead><tr><th>任务</th><th>模型</th><th>内容</th><th>状态</th></tr></thead>
        <tbody id="jobs"><tr><td colspan="4" style="color:var(--soft)">加载中…</td></tr></tbody></table>
      </div>

      <div class="card"><div class="lbl">实时 J/token(30 秒窗口)</div>
        <table><thead><tr><th>模型</th><th>J/token</th></tr></thead>
        <tbody id="jpt"></tbody></table>
      </div>
    <script>
      const GRAFANA = localStorage.getItem('grafana_url') || 'https://childhood-texture-sunny-tri.trycloudflare.com';
      document.getElementById('glink').href = GRAFANA + '/d/aitra-demo-a';
      let sel = {models: new Set(), shape: 'balanced', concurrency: 8};
      const SHAPE_DESC = {balanced:'输入512/输出256', summarize:'输入4096/输出64(重读)', generate:'输入64/输出1024(重写)', sharegpt:'ShareGPT 真人对话'};

      function pill(txt, key, group, desc) {
        const d = document.createElement('div');
        d.className = 'opt'; d.innerHTML = txt + (desc ? `<small>${desc}</small>` : '');
        d.dataset.key = key;
        d.onclick = () => {
          if (group === 'model') {                 // multi-select
            d.classList.toggle('sel');
            if (sel.models.has(key)) sel.models.delete(key); else sel.models.add(key);
          } else {
            sel[group] = (group === 'concurrency') ? parseInt(key) : key;
            d.parentNode.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
            d.classList.add('sel');
          }
        };
        return d;
      }
      let built = false;
      async function refresh() {
        try {
          const r = await fetch('/api/status'); const s = await r.json();
          if (!built) {
            built = true;
            const mBox = document.getElementById('models');
            s.models.forEach(m => mBox.appendChild(pill(m, m, 'model')));
            const shBox = document.getElementById('shapes');
            Object.entries(s.shapes).forEach(([k, lbl]) => {
              const p = pill(lbl, k, 'shape', SHAPE_DESC[k] || '');
              if (k === sel.shape) p.classList.add('sel');
              shBox.appendChild(p);
            });
            const cBox = document.getElementById('conc');
            s.concurrency.forEach(c => {
              const p = pill(String(c), String(c), 'concurrency');
              if (c === sel.concurrency) p.classList.add('sel');
              cBox.appendChild(p);
            });
          }
          const jb = document.getElementById('jobs');
          jb.innerHTML = s.jobs.length ? s.jobs.map(j =>
            `<tr><td>${j.name}</td><td>${j.model}</td><td>${j.desc}</td><td class="st-${j.state}">${j.state}</td></tr>`
          ).join('') : '<tr><td colspan="4" style="color:var(--soft)">当前没有演示任务</td></tr>';
          const jt = document.getElementById('jpt');
          jt.innerHTML = Object.entries(s.jpt).sort((a,b)=>a[1]-b[1]).map(([m,v]) =>
            `<tr><td>${m}</td><td>${v}</td></tr>`).join('');
          const st = document.getElementById('stats');
          const p = s.power || {};
          st.innerHTML = `<span>干活功率 <b>${p.serving ?? '—'}</b> W</span>` +
                         `<span>待机功率 <b>${p.idle ?? '—'}</b> W</span>` +
                         `<span>底噪流量 <b>${s.loadgen > 0 ? '开' : '关'}</b></span>`;
          const lg = document.getElementById('lg');
          lg.textContent = s.loadgen > 0 ? '⏻ 关闭底噪(进入空载)' : '⏻ 打开底噪(恢复常态)';
          lg.className = s.loadgen > 0 ? '' : 'off';
          lg.dataset.on = s.loadgen > 0 ? '1' : '0';
        } catch (e) { /* keep last view */ }
      }
      const msg = document.getElementById('msg');
      function say(t, cls) { msg.textContent = t; msg.className = cls || ''; }
      async function post(path, body) {
        const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body || {})});
        return r.json();
      }
      function report(d) {
        const ok = (d.started || []).length;
        let t = ok ? `✓ 已启动 ${ok} 个任务` : '';
        if (d.errors && d.errors.length) t += (t ? ';' : '✗ ') + d.errors.join(';');
        say(t || '✗ 启动失败', d.errors && !ok ? 'err' : 'ok');
      }
      document.getElementById('go').onclick = async () => {
        if (!sel.models.size) { say('请先选择至少一个模型(可多选)', 'err'); return; }
        say('启动中…');
        const d = await post('/api/start',
          {models: [...sel.models], shape: sel.shape, concurrency: sel.concurrency});
        report(d); refresh();
      };
      document.querySelectorAll('.scenebtn').forEach(b => b.onclick = async () => {
        if (!sel.models.size) { say('请先选择至少一个模型(可多选)', 'err'); return; }
        say('启动中…');
        const d = await post('/api/start',
          {models: [...sel.models], shape: sel.shape, scene: b.dataset.scene});
        report(d); refresh();
      });
      document.getElementById('stop').onclick = async () => {
        const d = await post('/api/stop');
        say('■ 已停止 ' + d.stopped + ' 个任务', 'ok'); refresh();
      };
      document.getElementById('lg').onclick = async (e) => {
        const on = e.target.dataset.on === '1';
        say(on ? '正在关闭底噪流量…' : '正在恢复底噪流量…');
        const d = await post('/api/loadgen', {on: !on});
        say(d.error ? ('✗ ' + d.error) : (on ? '✓ 底噪已关——约 1 分钟后看板进入空载形态' : '✓ 底噪已恢复'), d.error ? 'err' : 'ok');
        refresh();
      };
      refresh(); setInterval(refresh, 5000);
    </script></main></body></html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-control
  namespace: aitra-system
  labels:
    app: demo-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-control
  template:
    metadata:
      labels:
        app: demo-control
    spec:
      serviceAccountName: demo-control
      nodeSelector:
        kubernetes.io/hostname: xspark
      containers:
        - name: panel
          image: vllm/vllm-openai:v0.19.0
          imagePullPolicy: Never
          command: ["python3", "/app/app.py"]
          env:
            - name: PROM_URL
              value: "http://aitra-meter-prometheus:9090"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: app
          configMap:
            name: demo-control-app
---
apiVersion: v1
kind: Service
metadata:
  name: demo-control
  namespace: aitra-system
  labels:
    app: demo-control
spec:
  type: NodePort
  selector:
    app: demo-control
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30853

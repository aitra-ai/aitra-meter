apiVersion: apps/v1
kind: Deployment
metadata:
  name: aitra-meter-dashboard
  namespace: aitra-system
  labels: { app: aitra-meter, component: dashboard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: aitra-meter, component: dashboard }
  template:
    metadata:
      labels: { app: aitra-meter, component: dashboard }
    spec:
      containers:
        - name: dashboard
          image: aitra-meter/dashboard:dev
          imagePullPolicy: Never
          env:
            - { name: AGGREGATION_URL, value: "http://aitra-meter-aggregation.aitra-system:8080" }
            - { name: PROMETHEUS_URL, value: "http://prometheus-k8s.kubesphere-monitoring-system:9090" }
          ports:
            - { name: http, containerPort: 3000 }
---
apiVersion: v1
kind: Service
metadata:
  name: aitra-meter-dashboard
  namespace: aitra-system
  labels: { app: aitra-meter, component: dashboard }
spec:
  type: NodePort
  selector: { app: aitra-meter, component: dashboard }
  ports:
    - { name: http, port: 3000, targetPort: http, nodePort: 30300 }
